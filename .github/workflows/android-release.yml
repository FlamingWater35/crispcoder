# Workflow that triggers on version tags (e.g. v1.0.0) to build signed
# Android release APKs (split by ABI) and publish them as a draft GitHub Release.
name: Android Release

on:
  push:
    tags:
      - "v*" # Triggers only on tags starting with 'v'

jobs:
  build-and-release:
    name: Build & Draft Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to create a release and upload assets

    steps:
      # Checkout repository code with full history for changelog generation if needed
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Java 17 environment required by Android Gradle
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # Set up Flutter with caching to speed up subsequent builds
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true

      # Cache Gradle dependencies to speed up the Android build process
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Fetch Flutter dependencies
      - name: Install Flutter dependencies
        run: flutter pub get

      # Decode the base64 encoded keystore from GitHub Secrets into a .jks file
      - name: Decode Keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks

          # Fail the job early if decoding failed and the file doesn't exist
          if [ ! -f android/app/keystore.jks ]; then
            echo "Error: Keystore file was not created successfully."
            exit 1
          fi

      # Generate the key.properties file read by the Gradle build script
      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF

      # Build the release APKs split by ABI using the injected signing configurations
      - name: Build Release APKs
        run: flutter build apk --release --split-per-abi

      # Rename all generated APKs to include the version tag and ABI architecture
      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in app-*-release.apk; do
            if [ -f "$f" ]; then
              # Extract the ABI string (e.g., arm64-v8a) from the filename
              abi="${f//app-/}"
              abi="${abi//-release.apk/}"

              # Rename to crispcoder-v1.0.0-arm64-v8a.apk
              mv "$f" "crispcoder-${{ github.ref_name }}-$abi.apk"
            fi
          done

      # Create a draft GitHub Release and attach the renamed APKs
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          files: build/app/outputs/flutter-apk/crispcoder-*.apk
